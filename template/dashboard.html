<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>📘 Dashboard</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="#">Categories</a>
        <a href="#">Wishlist</a>
        <a href="admin.html" id="adminLink" style="display:none;color:crimson;font-weight:600;">Admin</a>
    </nav>
    <div class="search">
        <input class="search-input" placeholder="Search books...">
    </div>
    <div>
        <span id="user"></span>
        <button onclick="logout()">Logout</button>
        <button onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
    </div>
</header>

<!-- Books listing (rendered dynamically) -->
<main class="books" id="booksContainer"></main>

<div class="cart" id="cartBox">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div id="cartContent">
        <ul id="cartItems"></ul>
        <p class="cart-total">Total: $<span id="total">0</span></p>
        <button class="checkout-btn" onclick="checkout()">Checkout</button>
        <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
    </div>
    <div id="emptyCart" style="display:none;text-align:center;padding:20px;">
        <p>Your cart is empty</p>
    </div>
</div>

<div id="notification" class="notification"></div>

<script src="books.js"></script>
<script src="auth.js"></script>
<script src="cart.js"></script>
<script src="user_books.js"></script>
<script>
let rawUser = localStorage.getItem("loggedUser");
if(!rawUser){ window.location.href="login.html"; }
let currentUser;
try {
    currentUser = JSON.parse(rawUser);
} catch(e){
    currentUser = { name: rawUser };
}
document.getElementById("user").innerText = "Welcome, " + (currentUser.name || currentUser);

function logout(){
    localStorage.removeItem("loggedUser");
    window.location.href="home.html";
}
// Show admin link only for admin users
(function(){
    try{
        const link = document.getElementById('adminLink');
        if(currentUser && currentUser.isAdmin){ link.style.display = 'inline-block'; }
    }catch(e){}
})();
</script>
</body>
</html>
